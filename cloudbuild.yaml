steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg MONGODB_URI=$$MONGODB_URI \
          --build-arg GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID \
          --build-arg GOOGLE_CLIENT_SECRET=$$GOOGLE_CLIENT_SECRET \
          --build-arg NEXTAUTH_URL=$$NEXTAUTH_URL \
          --build-arg NEXTAUTH_SECRET=$$NEXTAUTH_SECRET \
          --build-arg AUTH_TRUST_HOST=$$AUTH_TRUST_HOST \
          --build-arg AUTH_URL=$$AUTH_URL \
          --build-arg SMTP_HOST=$$SMTP_HOST \
          --build-arg SMTP_PORT=$$SMTP_PORT \
          --build-arg SMTP_USER=$$SMTP_USER \
          --build-arg SMTP_PASS=$$SMTP_PASS \
          --build-arg SMTP_FROM=$$SMTP_FROM \
          --build-arg CRON_SECRET=$$CRON_SECRET \
          -t southamerica-east1-docker.pkg.dev/parquetec/cloud-run-source-deploy/smcti-website .
    secretEnv:
      - MONGODB_URI
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - NEXTAUTH_URL
      - NEXTAUTH_SECRET
      - AUTH_TRUST_HOST
      - AUTH_URL
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
      - CRON_SECRET

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'southamerica-east1-docker.pkg.dev/parquetec/cloud-run-source-deploy/smcti-website'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'smcti-website'
      - '--image'
      - 'southamerica-east1-docker.pkg.dev/parquetec/cloud-run-source-deploy/smcti-website'
      - '--region'
      - 'southamerica-east1'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/MONGODB_URI/versions/latest
      env: 'MONGODB_URI'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: 'GOOGLE_CLIENT_ID'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_SECRET/versions/latest
      env: 'GOOGLE_CLIENT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/NEXTAUTH_URL/versions/latest
      env: 'NEXTAUTH_URL'
    - versionName: projects/$PROJECT_ID/secrets/NEXTAUTH_SECRET/versions/latest
      env: 'NEXTAUTH_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/AUTH_TRUST_HOST/versions/latest
      env: 'AUTH_TRUST_HOST'
    - versionName: projects/$PROJECT_ID/secrets/AUTH_URL/versions/latest
      env: 'AUTH_URL'
    - versionName: projects/$PROJECT_ID/secrets/SMTP_HOST/versions/latest
      env: 'SMTP_HOST'
    - versionName: projects/$PROJECT_ID/secrets/SMTP_PORT/versions/latest
      env: 'SMTP_PORT'
    - versionName: projects/$PROJECT_ID/secrets/SMTP_USER/versions/latest
      env: 'SMTP_USER'
    - versionName: projects/$PROJECT_ID/secrets/SMTP_PASS/versions/latest
      env: 'SMTP_PASS'
    - versionName: projects/$PROJECT_ID/secrets/SMTP_FROM/versions/latest
      env: 'SMTP_FROM'
    - versionName: projects/$PROJECT_ID/secrets/CRON_SECRET/versions/latest
      env: 'CRON_SECRET'

images:
  - 'southamerica-east1-docker.pkg.dev/parquetec/cloud-run-source-deploy/smcti-website'